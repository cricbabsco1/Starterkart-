<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Starterkart — Websites That Sell</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #070707;
  --bg2: #0f0f0f;
  --bg3: #141414;
  --surface: #1a1a1a;
  --border: #242424;
  --border2: #2e2e2e;
  --white: #f8f6f2;
  --white2: #e8e4dc;
  --muted: #666;
  --muted2: #444;
  --gold: #c9a96e;
  --gold2: #a8834a;
  --gold-light: #e8c98a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;cursor:none}
::selection{background:var(--gold);color:var(--bg)}
/* CURSOR */
#cur{position:fixed;width:6px;height:6px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s,background .25s}
#cur-r{position:fixed;width:32px;height:32px;border:1px solid rgba(201,169,110,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,opacity .3s}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;justify-content:space-between;align-items:center;padding:22px 48px;background:rgba(7,7,7,0);backdrop-filter:blur(0px);transition:background .4s,backdrop-filter .4s}
nav.scrolled{background:rgba(7,7,7,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:.08em;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s}
.nav-links a:hover{color:var(--white)}
.nav-btn{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--bg);background:var(--gold);text-decoration:none;padding:11px 24px;border-radius:2px;transition:background .3s}
.nav-btn:hover{background:var(--gold-light)}
.nav-ham{display:none;flex-direction:column;gap:5px;cursor:none;border:none;background:none;padding:4px}
.nav-ham span{display:block;width:22px;height:1px;background:var(--white);transition:all .3s}
/* MOBILE NAV */
.mobile-menu{position:fixed;inset:0;background:var(--bg);z-index:499;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:36px;transform:translateX(100%);transition:transform .5s cubic-bezier(.16,1,.3,1)}
.mobile-menu.open{transform:translateX(0)}
.mobile-menu a{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:.04em;transition:color .3s}
.mobile-menu a:hover{color:var(--gold)}
/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 80px;position:relative;overflow:hidden}
.hero-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 65% 20%,#1a1308 0%,transparent 65%),radial-gradient(ellipse 50% 40% at 20% 80%,#0d0d0d 0%,transparent 60%);z-index:0}
.hero-grain{position:absolute;inset:0;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:1}
.hero-line-h{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,.1),transparent);z-index:1}
.hero-line-h.top{top:42%}.hero-line-h.bot{top:62%}
.hero-line-v{position:absolute;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,rgba(201,169,110,.08),transparent);z-index:1}
.hero-line-v.l{left:45%}.hero-line-v.r{right:30%}
.hero-tag{position:absolute;top:38%;right:48px;z-index:2;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;display:flex;align-items:center;gap:14px;opacity:0;animation:fadeIn 1s ease 1.4s forwards}
.hero-tag::before{content:'';display:block;width:1px;height:52px;background:linear-gradient(to bottom,transparent,var(--gold))}
.hero-content{position:relative;z-index:2;max-width:1000px}
.hero-eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:36px;opacity:0;animation:fadeUp .8s ease .2s forwards}
.hero-h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(68px,10.5vw,148px);line-height:.9;letter-spacing:-.01em;margin-bottom:48px;opacity:0;animation:fadeUp .9s ease .4s forwards}
.hero-h1 strong{font-weight:600;font-style:italic;color:var(--gold)}
.hero-bottom{display:flex;justify-content:space-between;align-items:flex-end;opacity:0;animation:fadeUp .9s ease .7s forwards}
.hero-sub{font-size:15px;line-height:1.75;color:rgba(248,246,242,.45);max-width:380px}
.hero-btns{display:flex;flex-direction:column;gap:12px;align-items:flex-end}
.btn-gold{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--bg);background:var(--gold);text-decoration:none;padding:16px 36px;border-radius:2px;transition:all .3s;white-space:nowrap}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(248,246,242,.4);text-decoration:none;border:1px solid var(--border2);padding:15px 28px;border-radius:2px;transition:all .3s;white-space:nowrap}
.btn-outline:hover{color:var(--white);border-color:var(--muted)}
.hero-scroll-ind{position:absolute;bottom:80px;left:48px;z-index:2;display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted2);opacity:0;animation:fadeIn 1s ease 1.2s forwards}
.hero-scroll-ind::before{content:'';display:block;width:36px;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
/* TICKER */
.ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2);padding:16px 0;overflow:hidden}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 22s linear infinite}
.ticker-item{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);padding:0 48px;flex-shrink:0;display:flex;align-items:center;gap:48px}
.ticker-item .dot{width:3px;height:3px;background:var(--gold);border-radius:50%;display:inline-block}
/* SECTION BASE */
section{padding:120px 48px}
.section-inner{max-width:1200px;margin:0 auto}
.s-tag{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.s-h2{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(40px,6vw,78px);line-height:1;letter-spacing:-.01em}
.s-h2 em{font-style:italic;color:var(--gold)}
/* STATS */
.stats-section{padding:80px 48px;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.stats-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.stat-cell{padding:48px 36px;border-right:1px solid var(--border);text-align:center}
.stat-cell:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:300;color:var(--gold);line-height:1;margin-bottom:10px}
.stat-label{font-size:12px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
/* PROBLEM */
.problem-section{background:var(--bg)}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;margin-top:80px}
.problem-list{display:flex;flex-direction:column;gap:0}
.problem-item{padding:28px 0;border-bottom:1px solid var(--border);display:flex;gap:24px;align-items:flex-start;transition:all .3s}
.problem-item:hover .p-icon{color:var(--gold)}
.p-icon{font-size:20px;margin-top:2px;flex-shrink:0;color:var(--muted2);transition:color .3s}
.p-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:6px;letter-spacing:.01em}
.p-desc{font-size:13px;color:var(--muted);line-height:1.7}
.problem-right{display:flex;flex-direction:column;gap:28px}
.problem-quote{padding:40px;border:1px solid var(--border);border-radius:4px;position:relative;overflow:hidden}
.problem-quote::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:120px;color:rgba(201,169,110,.08);position:absolute;top:-20px;left:20px;line-height:1}
.pq-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;line-height:1.6;color:var(--white2);position:relative;z-index:1;margin-bottom:20px}
.pq-attr{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
/* SERVICES */
.services-section{background:var(--bg3)}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:72px}
.svc-card{background:var(--bg);padding:48px 36px;position:relative;overflow:hidden;transition:all .4s}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .4s}
.svc-card:hover{background:#0c0c0c}
.svc-card:hover::after{transform:scaleX(1)}
.svc-n{font-family:'Cormorant Garamond',serif;font-size:80px;color:rgba(248,246,242,.04);line-height:1;margin-bottom:32px}
.svc-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:.02em;margin-bottom:14px}
.svc-desc{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:28px}
.svc-features{list-style:none;display:flex;flex-direction:column;gap:9px}
.svc-features li{font-size:12px;color:rgba(248,246,242,.35);display:flex;align-items:center;gap:10px}
.svc-features li::before{content:'';width:12px;height:1px;background:var(--gold);flex-shrink:0}
/* PROCESS */
.process-section{background:var(--bg)}
.process-grid{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center;margin-top:80px}
.process-steps{display:flex;flex-direction:column;gap:0}
.ps{display:grid;grid-template-columns:56px 1fr;gap:24px;padding:32px 0;border-bottom:1px solid var(--border);align-items:start;transition:all .3s}
.ps:hover .ps-num{color:var(--gold)}
.ps-num{font-family:'Cormorant Garamond',serif;font-size:40px;color:rgba(248,246,242,.12);line-height:1;transition:color .3s}
.ps-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;margin-bottom:8px;letter-spacing:.01em}
.ps-desc{font-size:13px;color:var(--muted);line-height:1.7}
.process-visual{display:flex;flex-direction:column;gap:20px}
.pv-card{padding:32px;border:1px solid var(--border);border-radius:4px;position:relative;overflow:hidden;transition:border-color .3s}
.pv-card:hover{border-color:var(--gold2)}
.pv-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,169,110,.04) 0%,transparent 60%)}
.pv-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.pv-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--white)}
/* PRICING */
.pricing-section{background:var(--bg2)}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:72px}
.price-card{background:var(--bg);padding:52px 40px;position:relative;overflow:hidden;transition:all .4s}
.price-card.featured{background:var(--bg3);border:1px solid var(--gold2)}
.price-card.featured .pc-badge{display:block}
.pc-badge{display:none;position:absolute;top:20px;right:20px;font-family:'Syne',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;background:var(--gold);color:var(--bg);padding:5px 12px;border-radius:100px}
.pc-tier{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
.pc-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:.03em}
.pc-price{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:var(--gold);line-height:1;margin-bottom:6px}
.pc-price sup{font-size:22px;vertical-align:super}
.pc-note{font-size:11px;color:var(--muted);margin-bottom:36px}
.pc-divider{height:1px;background:var(--border);margin-bottom:32px}
.pc-list{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:40px}
.pc-list li{font-size:13px;color:rgba(248,246,242,.6);display:flex;align-items:center;gap:12px}
.pc-list li.has::before{content:'✓';color:var(--gold);font-size:12px;font-weight:600;width:16px;flex-shrink:0}
.pc-list li.no{opacity:.3;text-decoration:line-through}
.pc-list li.no::before{content:'—';color:var(--muted);width:16px;flex-shrink:0}
.pc-cta{display:block;width:100%;text-align:center;font-family:'Syne',sans-serif;font-weight:600;font-size:11px;letter-spacing:.15em;text-transform:uppercase;padding:15px;border-radius:2px;text-decoration:none;transition:all .3s;cursor:none}
.pc-cta.outline{border:1px solid var(--border2);color:var(--white);background:transparent}
.pc-cta.outline:hover{border-color:var(--gold);color:var(--gold)}
.pc-cta.solid{background:var(--gold);color:var(--bg)}
.pc-cta.solid:hover{background:var(--gold-light)}
.pricing-note{margin-top:40px;text-align:center;font-size:13px;color:var(--muted)}
.pricing-note a{color:var(--gold);text-decoration:none}
/* TESTIMONIALS */
.testi-section{background:var(--bg)}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:72px}
.testi-card{background:var(--bg2);padding:40px;position:relative;overflow:hidden;transition:all .3s}
.testi-card:hover{background:var(--bg3)}
.testi-stars{display:flex;gap:4px;margin-bottom:24px}
.testi-stars span{color:var(--gold);font-size:13px}
.testi-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;line-height:1.65;color:var(--white2);margin-bottom:28px}
.testi-author{display:flex;align-items:center;gap:14px}
.testi-avatar{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--gold)}
.testi-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:600}
.testi-brand{font-size:11px;color:var(--muted);letter-spacing:.06em}
/* FAQ */
.faq-section{background:var(--bg2)}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;margin-top:80px;align-items:start}
.faq-list{display:flex;flex-direction:column;gap:0}
.faq-item{border-bottom:1px solid var(--border);overflow:hidden}
.faq-q{width:100%;background:none;border:none;text-align:left;padding:24px 0;display:flex;justify-content:space-between;align-items:center;cursor:none;color:var(--white)}
.faq-q-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;letter-spacing:.01em}
.faq-icon{width:20px;height:20px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;color:var(--muted);font-size:14px}
.faq-item.open .faq-icon{background:var(--gold);border-color:var(--gold);color:var(--bg);transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s ease}
.faq-item.open .faq-a{max-height:200px;padding-bottom:20px}
.faq-a p{font-size:13px;color:var(--muted);line-height:1.75}
.faq-right{padding:48px;background:var(--bg);border:1px solid var(--border);border-radius:4px}
.faq-right h3{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;margin-bottom:16px;line-height:1.2}
.faq-right h3 em{font-style:italic;color:var(--gold)}
.faq-right p{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:32px}
/* QUOTE FORM */
.quote-section{background:var(--bg);padding:120px 48px}
.quote-inner{max-width:860px;margin:0 auto}
.form-progress{display:flex;gap:0;margin-bottom:64px;position:relative}
.form-progress::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);z-index:0}
.fp-step{display:flex;align-items:center;gap:10px;position:relative;z-index:1;flex:1;justify-content:center}
.fp-step:first-child{justify-content:flex-start}
.fp-step:last-child{justify-content:flex-end}
.fp-num{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);transition:all .4s}
.fp-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .4s}
.fp-step.active .fp-num{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.fp-step.active .fp-label{color:var(--white)}
.fp-step.done .fp-num{background:var(--gold2);border-color:var(--gold2);color:var(--bg)}
.form-step{display:none}
.form-step.active{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.form-input,.form-select,.form-textarea{background:var(--bg2);border:1px solid var(--border);color:var(--white);padding:14px 18px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;transition:border-color .3s;outline:none;width:100%;-webkit-appearance:none}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted2)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold)}
.form-select option{background:var(--bg2);color:var(--white)}
.form-textarea{resize:vertical;min-height:110px}
.form-nav{display:flex;justify-content:space-between;align-items:center;margin-top:40px}
.btn-prev{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:none;transition:color .3s}
.btn-prev:hover{color:var(--white)}
.btn-next,.btn-submit{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;letter-spacing:.15em;text-transform:uppercase;background:var(--gold);color:var(--bg);border:none;padding:16px 36px;border-radius:2px;cursor:none;transition:background .3s}
.btn-next:hover,.btn-submit:hover{background:var(--gold-light)}
.form-success{display:none;text-align:center;padding:80px 20px}
.form-success.show{display:block}
.success-icon{font-size:48px;margin-bottom:24px}
.success-h{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;margin-bottom:16px}
.success-h em{font-style:italic;color:var(--gold)}
.success-p{font-size:15px;color:var(--muted);line-height:1.75}
/* FINAL CTA */
.final-cta{padding:160px 48px;background:var(--bg2);position:relative;overflow:hidden;text-align:center}
.final-cta-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 50%,#1a1308 0%,transparent 70%);z-index:0}
.final-cta-inner{position:relative;z-index:1;max-width:720px;margin:0 auto}
.final-h{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(52px,8.5vw,110px);line-height:.9;letter-spacing:-.01em;margin-bottom:36px}
.final-h em{font-style:italic;color:var(--gold);display:block}
.final-sub{font-size:15px;color:rgba(248,246,242,.4);line-height:1.75;max-width:400px;margin:0 auto 52px}
.final-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
/* FOOTER */
footer{background:var(--bg);border-top:1px solid var(--border);padding:56px 48px 40px}
.footer-top{display:grid;grid-template-columns:1.
